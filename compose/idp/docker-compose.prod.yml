# Companero ID (Zitadel) — prod, id.companero.ro
# Deploy: Dokploy → proiect „companero-id" → serviciu Compose (paste acest fișier).
# PG-ul NU e aici: e serviciu Database gestionat de Dokploy (backup R2 din UI) — vezi README.md.
# Toate valorile ${...} se setează în Dokploy → Environment (NU în fișier, NU în .env pe host).

services:
  zitadel:
    # Pin explicit la deploy: verifică ultima versiune stabilă pe
    # https://github.com/zitadel/zitadel/releases și înlocuiește tag-ul.
    # NU folosi :latest pe prod (upgrade-urile Zitadel rulează migrări de DB).
    image: ghcr.io/zitadel/zitadel:${ZITADEL_VERSION}
    restart: unless-stopped
    # TLS terminat de Traefik (Dokploy) + Cloudflare; Zitadel vorbește HTTP intern.
    command: start-from-init --tlsMode external
    environment:
      # Cheia de criptare a instanței — generată o dată (exact 32 caractere):
      #   openssl rand -hex 16
      # Păstreaz-o în Dokploy Environment + un backup offline. Pierdută = instanță nerecuperabilă.
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}

      # PG-ul gestionat de Dokploy (host = numele intern al serviciului DB, vezi README pasul 2)
      ZITADEL_DATABASE_POSTGRES_HOST: ${PG_HOST}
      ZITADEL_DATABASE_POSTGRES_PORT: '5432'
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${PG_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      # Admin = același user (Dokploy creează un singur user); Zitadel îl folosește
      # doar la init pentru a-și crea schema.
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${PG_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable

      # Identitatea publică a instanței
      ZITADEL_EXTERNALSECURE: 'true'
      ZITADEL_EXTERNALDOMAIN: id.companero.ro
      ZITADEL_EXTERNALPORT: '443'

      # Prima instanță (se aplică DOAR la primul boot, pe DB gol)
      ZITADEL_FIRSTINSTANCE_ORG_NAME: Companero
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ADMIN_USERNAME}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_ADDRESS: ${ADMIN_EMAIL}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_EMAIL_VERIFIED: 'true'

      # Cont de serviciu cu PAT pentru provisioning programatic al clienților OIDC
      # (refolosim pattern-ul din companero.facturare/scripts/zitadel-bootstrap.sh la A2/A3/A7).
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: provisioner
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Provisioner
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: '2030-01-01T00:00:00Z'
    volumes:
      - zitadel_machinekey:/machinekey
    networks:
      - dokploy-network
    # Rutarea Traefik e declarată explicit aici (Dokploy nu injectează label-uri
    # pentru serviciile Compose de tip Raw — constatat la primul deploy, 2026-07-18).
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.companero-id.rule=Host(`id.companero.ro`)
      - traefik.http.routers.companero-id.entrypoints=websecure
      - traefik.http.routers.companero-id.tls=true
      - traefik.http.routers.companero-id.tls.certresolver=letsencrypt
      - traefik.http.routers.companero-id.service=companero-id
      - traefik.http.services.companero-id.loadbalancer.server.port=8080
      # și pe :80 (ACME/redirect prin Cloudflare)
      - traefik.http.routers.companero-id-web.rule=Host(`id.companero.ro`)
      - traefik.http.routers.companero-id-web.entrypoints=web
      - traefik.http.routers.companero-id-web.service=companero-id
    healthcheck:
      test: ['CMD', '/app/zitadel', 'ready']
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  zitadel_machinekey:

networks:
  dokploy-network:
    external: true
